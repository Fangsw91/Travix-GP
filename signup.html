<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Travix</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="modal.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Arimo:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="js/api-config.js"></script>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-wrapper">
                <div class="logo" onclick="window.location.href='travix-landing.html'" style="cursor: pointer;">
                    <img src="travix-logo.png" alt="Travix Logo">
                </div>
                <ul class="nav-menu">
                    <li><a href="travix-landing.html">Home</a></li>
                    <li><a href="calculator.html">Calculator</a></li>
                    <li><a href="travix-landing.html#how-it-works">How it Works</a></li>
                    <li><a href="travix-landing.html#about">About</a></li>
                    <li><a href="travix-landing.html#help">Help</a></li>
                </ul>
                <div class="nav-actions">
                    <div id="navAuthButtons">
                        <a href="signin.html" class="btn-link">Log in</a>
                        <a href="signup.html" class="btn-primary" style="text-decoration: none; display: inline-block;">Sign up</a>
                    </div>
                    <div id="navUserButtons" style="display: none;">
                        <button class="btn-profile" onclick="window.location.href='user-dashboard.html'">
                            <svg width="18" height="18" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="10" cy="7" r="3" fill="currentColor"/>
                                <path d="M4 17C4 14 7 12 10 12C13 12 16 14 16 17" stroke="currentColor" stroke-width="2" fill="none"/>
                            </svg>
                            Profile
                        </button>
                        <button class="btn-logout-nav" id="navLogoutBtn">
                            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M11 3L15 7L11 11M15 7H5M5 3V11" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                            Logout
                        </button>
                    </div>
                </div>
                <button class="mobile-menu-toggle">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Sign Up Section -->
    <section class="signin-section">
        <div class="signin-container">
            <div class="signin-card">
                <!-- Package Icon -->
                <div class="signin-icon">
                    <svg width="60" height="60" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect width="60" height="60" rx="12" fill="#F4C542"/>
                        <rect x="20" y="22" width="20" height="20" fill="#1A2B4A" stroke="#1A2B4A" stroke-width="2" rx="2"/>
                        <path d="M20 32 L40 32" stroke="#F4C542" stroke-width="2"/>
                        <path d="M30 22 L30 42" stroke="#F4C542" stroke-width="2"/>
                    </svg>
                </div>

                <!-- Welcome Text -->
                <h1 class="signin-title">Create Account</h1>
                <p class="signin-subtitle">Join Travix and start shipping or earning today</p>

                <!-- Sign Up Form -->
                <form class="signin-form" id="signupForm">
                    <!-- Name Field -->
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input 
                            type="text" 
                            id="name" 
                            name="name" 
                            placeholder="Enter your full name"
                            required
                        >
                    </div>

                    <!-- Email Field -->
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            placeholder="you@example.com"
                            required
                        >
                    </div>

                    <!-- Phone Field (Required) -->
                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input 
                            type="tel" 
                            id="phone" 
                            name="phone" 
                            placeholder="+962 77 123 4567"
                            required
                        >
                    </div>

                    <!-- Password Field -->
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="At least 8 characters"
                            required
                            minlength="8"
                        >
                        <div class="password-strength">
                            <div class="password-strength-bar"></div>
                            <div class="password-strength-text"></div>
                        </div>
                    </div>

                    <!-- Confirm Password Field -->
                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <input 
                            type="password" 
                            id="confirmPassword" 
                            name="confirmPassword" 
                            placeholder="Re-enter your password"
                            required
                            minlength="6"
                        >
                    </div>

                    <!-- Account Type -->
                    <div class="form-group">
                        <label>I want to</label>
                        <input type="hidden" id="role" name="role" required>
                        <div class="role-toggle">
                            <button type="button" class="role-btn" id="roleSender" onclick="selectRole('sender')">
                                <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                                    <path d="M5 8h14M5 8a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v.5a2 2 0 01-2 2M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                                </svg>
                                <span class="role-btn-title">Send Items</span>
                                <span class="role-btn-sub">I want to send packages</span>
                            </button>
                            <button type="button" class="role-btn" id="roleTraveler" onclick="selectRole('traveler')">
                                <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                                    <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                                <span class="role-btn-title">Carry & Earn</span>
                                <span class="role-btn-sub">I travel and deliver items</span>
                            </button>
                        </div>
                    </div>

                    <!-- Terms and Conditions -->
                    <div class="form-group checkbox-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="terms" name="terms" required>
                            <span>I agree to the <a href="terms-of-service.html" target="_blank">Terms of Service</a> and <a href="privacy-policy.html" target="_blank">Privacy Policy</a></span>
                        </label>
                    </div>


                    <button type="submit" class="btn-signin">Create Account</button>

                    <!-- Sign In Link -->
                    <p class="signup-link">
                        Already have an account? <a href="signin.html">Sign In</a>
                    </p>
                </form>
            </div>
        </div>
    </section>

    <script src="modal.js"></script>
    <script src="js/api-config.js"></script>
    <script src="js/demo-autofill.js"></script>
    <script src="signup.js"></script>
    <script src="navbar-auth.js"></script>

    <style>
        .role-toggle {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            margin-top: 0.25rem;
        }
        .role-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.4rem;
            padding: 1rem 0.75rem;
            border: 2px solid #E5E7EB;
            border-radius: 12px;
            background: #fff;
            cursor: pointer;
            transition: all 0.2s;
            color: #6B7280;
            text-align: center;
        }
        .role-btn:hover {
            border-color: #D4AF37;
            color: #0A1A2F;
        }
        .role-btn.active {
            border-color: #D4AF37;
            background: #FFFBEB;
            color: #0A1A2F;
            box-shadow: 0 0 0 3px rgba(212,175,55,0.15);
        }
        .role-btn svg { flex-shrink: 0; }
        .role-btn-title {
            font-weight: 700;
            font-size: 0.95rem;
        }
        .role-btn-sub {
            font-size: 0.78rem;
            color: #9CA3AF;
            line-height: 1.3;
        }
        .role-btn.active .role-btn-sub { color: #92400E; }
    </style>
    <script>
        function selectRole(role) {
            document.getElementById('role').value = role;
            document.getElementById('roleSender').classList.toggle('active', role === 'sender');
            document.getElementById('roleTraveler').classList.toggle('active', role === 'traveler');
        }
    </script>
</body>
</html>

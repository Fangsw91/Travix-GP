<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share Location - Travix</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        body { font-family: 'Inter', sans-serif; background: #F9FAFB; margin: 0; padding: 0; }
        .container { max-width: 480px; margin: 0 auto; padding: 1.5rem; }
        .card { background: #fff; border-radius: 16px; padding: 1.5rem; box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 1rem; }
        .card h2 { margin: 0 0 0.25rem; font-size: 1.2rem; color: #111; }
        .card p  { margin: 0 0 1rem; font-size: 0.875rem; color: #6B7280; }
        #miniMap { height: 200px; border-radius: 10px; overflow: hidden; margin-bottom: 1rem; }
        .btn-share {
            width: 100%; padding: 1rem; border: none; border-radius: 12px;
            background: linear-gradient(135deg, #D4AF37, #F4C542);
            color: #fff; font-size: 1rem; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 0.5rem;
        }
        .btn-share:disabled { background: #E5E7EB; color: #9CA3AF; cursor: not-allowed; }
        .btn-stop {
            width: 100%; padding: 0.75rem; border: 2px solid #EF4444;
            border-radius: 12px; background: #fff; color: #EF4444;
            font-size: 0.9rem; font-weight: 600; cursor: pointer; margin-top: 0.5rem;
        }
        .status-box {
            padding: 0.75rem 1rem; border-radius: 8px; font-size: 0.875rem;
            margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem;
        }
        .status-active   { background: #D1FAE5; color: #065F46; border: 1px solid #6EE7B7; }
        .status-inactive { background: #F3F4F6; color: #6B7280; }
        .status-error    { background: #FEE2E2; color: #991B1B; }
        .coords { font-size: 0.78rem; color: #9CA3AF; text-align: center; margin-top: 0.5rem; }
        .ping-count { font-size: 0.8rem; color: #6B7280; text-align: center; }
    </style>
</head>
<body>
<div class="container">
    <div style="text-align:center;padding:1.5rem 0 1rem;">
        <img src="travix-logo.png" alt="Travix" style="height:36px;">
        <h1 style="font-size:1.3rem;color:#111;margin:0.5rem 0 0;">Share Your Location</h1>
        <p style="color:#6B7280;font-size:0.875rem;">Let your sender track the delivery in real-time</p>
    </div>

    <!-- Order info -->
    <div class="card">
        <h2>📦 Active Delivery</h2>
        <p id="orderInfo">Loading order...</p>
        <div id="miniMap"></div>
        <div id="statusBox" class="status-box status-inactive">
            <span>⚪</span> <span id="statusText">Location sharing inactive</span>
        </div>
        <button class="btn-share" id="btnShare" onclick="startSharing()">
            📍 Start Sharing Location
        </button>
        <button class="btn-stop" id="btnStop" style="display:none;" onclick="stopSharing()">
            ⛔ Stop Sharing
        </button>
        <p class="ping-count" id="pingCount"></p>
        <p class="coords" id="coordsDisplay"></p>
    </div>

    <div style="font-size:0.78rem;color:#9CA3AF;text-align:center;padding-bottom:2rem;">
        Your location is only shared while this page is open.<br>
        The sender can see your live position on their tracking page.
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="js/api-config.js"></script>
<script>
let watchId    = null;
let miniMap    = null;
let miniMarker = null;
let pingCount  = 0;
let orderId    = null;
let shareTimer = null;

// Init
document.addEventListener('DOMContentLoaded', () => {
    orderId = new URLSearchParams(window.location.search).get('id')
           || localStorage.getItem('currentOrderId');

    document.getElementById('orderInfo').textContent =
        orderId ? `Order: ${orderId}` : 'No active order found.';

    if (!orderId) {
        document.getElementById('btnShare').disabled = true;
        return;
    }

    // Init mini map
    miniMap = L.map('miniMap').setView([31.9, 35.9], 5);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap', maxZoom: 18
    }).addTo(miniMap);
});

function startSharing() {
    if (!navigator.geolocation) {
        setStatus('error', '❌ Geolocation not supported by your browser');
        return;
    }

    setStatus('active', '🟢 Requesting location access...');
    document.getElementById('btnShare').disabled = true;

    // Get position continuously
    watchId = navigator.geolocation.watchPosition(
        onPosition,
        onGeoError,
        { enableHighAccuracy: true, maximumAge: 5000, timeout: 10000 }
    );

    document.getElementById('btnStop').style.display = 'block';
    document.getElementById('btnShare').style.display = 'none';
}

function stopSharing() {
    if (watchId) navigator.geolocation.clearWatch(watchId);
    clearInterval(shareTimer);
    watchId = null;
    setStatus('inactive', '⚪ Location sharing stopped');
    document.getElementById('btnStop').style.display  = 'none';
    document.getElementById('btnShare').style.display = 'block';
    document.getElementById('btnShare').disabled      = false;
}

function onPosition(pos) {
    const { latitude: lat, longitude: lng, accuracy } = pos.coords;

    // Update mini map
    if (miniMap) {
        if (!miniMarker) {
            miniMarker = L.marker([lat, lng]).addTo(miniMap);
        } else {
            miniMarker.setLatLng([lat, lng]);
        }
        miniMap.setView([lat, lng], 12);
    }

    document.getElementById('coordsDisplay').textContent =
        `📍 ${lat.toFixed(5)}, ${lng.toFixed(5)}  (±${Math.round(accuracy)}m)`;

    // Push to API
    pushLocation(lat, lng);
}

async function pushLocation(lat, lng) {
    const token = localStorage.getItem('auth_token');
    if (!token || !orderId) return;

    try {
        // Reverse geocode using Nominatim (free, no key)
        let address = null;
        try {
            const geo = await fetch(
                `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`,
                { headers: { 'Accept-Language': 'en' } }
            );
            const geoData = await geo.json();
            const c = geoData.address || {};
            address = [c.city || c.town || c.village, c.country].filter(Boolean).join(', ');
        } catch (_) {}

        await apiCall(`/shipments/${orderId}/location`, {
            method: 'POST',
            body:   JSON.stringify({ lat, lng, address })
        });

        pingCount++;
        setStatus('active', `🟢 Live — sharing location`);
        document.getElementById('pingCount').textContent =
            `${pingCount} update${pingCount !== 1 ? 's' : ''} sent to sender`;

    } catch (e) {
        setStatus('error', '⚠️ Could not send location — retrying...');
    }
}

function onGeoError(err) {
    const msgs = {
        1: 'Location permission denied. Please allow location access.',
        2: 'Location unavailable. Check your GPS.',
        3: 'Location request timed out.',
    };
    setStatus('error', '❌ ' + (msgs[err.code] || err.message));
    document.getElementById('btnShare').disabled = false;
}

function setStatus(type, text) {
    const box = document.getElementById('statusBox');
    box.className = 'status-box status-' + type;
    document.getElementById('statusText').textContent = text;
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - Travix</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { background: #F9FAFB; }

        .chat-page {
            max-width: 760px;
            margin: 0 auto;
            padding: 1rem;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .chat-header {
            background: #0A1A2F;
            color: #fff;
            border-radius: 14px 14px 0 0;
            padding: 1rem 1.25rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .chat-back {
            background: rgba(255,255,255,0.1);
            border: none;
            color: #fff;
            border-radius: 8px;
            padding: 0.4rem 0.75rem;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .chat-back:hover { background: rgba(255,255,255,0.2); }
        .chat-title { flex: 1; }
        .chat-title h3 { font-size: 1rem; font-weight: 700; margin: 0; }
        .chat-title p  { font-size: 0.78rem; color: rgba(255,255,255,0.6); margin: 0; }
        .chat-status-dot {
            width: 9px; height: 9px; border-radius: 50%;
            background: #10B981;
            animation: pulse 1.8s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.75)} }

        /* Messages area */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            background: #fff;
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-thumb { background: #E5E7EB; border-radius: 4px; }

        /* Message bubbles */
        .msg-row {
            display: flex;
            align-items: flex-end;
            gap: 0.5rem;
        }
        .msg-row.mine { flex-direction: row-reverse; }

        .msg-avatar {
            width: 32px; height: 32px; border-radius: 50%;
            background: #0A1A2F;
            color: #fff;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.75rem; font-weight: 700;
            flex-shrink: 0;
        }
        .msg-row.mine .msg-avatar { background: #D4AF37; }

        .msg-bubble {
            display: inline-block;
            width: fit-content;
            max-width: 68%;
            min-width: 2.5rem;
            padding: 0.65rem 0.9rem;
            border-radius: 16px;
            font-size: 0.9rem;
            line-height: 1.45;
            position: relative;
            word-wrap: break-word;
            overflow-wrap: break-word;
            white-space: pre-wrap;
        }
        .msg-row:not(.mine) .msg-bubble {
            background: #F3F4F6;
            color: #111;
            border-bottom-left-radius: 4px;
        }
        .msg-row.mine .msg-bubble {
            background: #0A1A2F;
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .msg-time {
            font-size: 0.68rem;
            color: #9CA3AF;
            margin-top: 3px;
            text-align: right;
        }
        .msg-row:not(.mine) .msg-time { text-align: left; }

        /* Date separator */
        .date-sep {
            text-align: center;
            font-size: 0.72rem;
            color: #9CA3AF;
            position: relative;
            margin: 0.5rem 0;
        }
        .date-sep::before, .date-sep::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 35%;
            height: 1px;
            background: #E5E7EB;
        }
        .date-sep::before { left: 0; }
        .date-sep::after  { right: 0; }

        /* Empty state */
        .chat-empty {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #9CA3AF;
            gap: 0.5rem;
            font-size: 0.9rem;
        }
        .chat-empty svg { opacity: 0.3; }

        /* Input bar */
        .chat-input-bar {
            background: #fff;
            border-top: 1px solid #F3F4F6;
            padding: 0.85rem 1rem;
            display: flex;
            gap: 0.6rem;
            align-items: center;
            border-radius: 0 0 14px 14px;
        }
        .chat-input {
            flex: 1;
            border: 1.5px solid #E5E7EB;
            border-radius: 22px;
            padding: 0.6rem 1rem;
            font-size: 0.9rem;
            outline: none;
            resize: none;
            max-height: 100px;
            font-family: inherit;
            transition: border-color 0.2s;
        }
        .chat-input:focus { border-color: #D4AF37; }
        .chat-send {
            width: 42px; height: 42px;
            border-radius: 50%;
            background: #D4AF37;
            border: none;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            transition: background 0.2s, transform 0.15s;
        }
        .chat-send:hover  { background: #C09B2A; }
        .chat-send:active { transform: scale(0.92); }
        .chat-send:disabled { background: #E5E7EB; cursor: not-allowed; }

        /* Shipment info bar */
        .shipment-bar {
            background: #FFFBEB;
            border: 1px solid #FDE68A;
            border-radius: 0;
            padding: 0.6rem 1.25rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.82rem;
            color: #92400E;
        }
        .shipment-bar strong { color: #0A1A2F; }

        /* Loading */
        .chat-loading {
            text-align: center;
            padding: 2rem;
            color: #9CA3AF;
            font-size: 0.875rem;
        }
    </style>
</head>
<body>
    <div class="chat-page">
        <div class="chat-header">
            <button class="chat-back" onclick="history.back()">← Back</button>
            <div class="chat-title">
                <h3 id="chatOtherName">Loading...</h3>
                <p id="chatShipmentRoute">—</p>
            </div>
            <div class="chat-status-dot" title="Live"></div>
        </div>

        <div class="shipment-bar">
            <span>Order: <strong id="chatOrderId">—</strong></span>
            <span id="chatStatus">—</span>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="chat-loading">Loading messages...</div>
        </div>

        <div class="chat-input-bar">
            <textarea class="chat-input" id="chatInput"
                placeholder="Type a message..."
                rows="1"
                onkeydown="handleKey(event)"></textarea>
            <button class="chat-send" id="sendBtn" onclick="sendMessage()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                    <path d="M22 2L11 13M22 2L15 22L11 13M22 2L2 9L11 13"
                          stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </div>
    </div>

    <script src="js/api-config.js"></script>
    <script>
    const params     = new URLSearchParams(location.search);
    const shipmentId = params.get('shipment');   // numeric DB id
    const orderId    = params.get('order');      // TRX-xxxx (for display)
    const isDemo     = !shipmentId || String(shipmentId).startsWith('demo-') || String(orderId).includes('DEMO');

    let currentUser  = null;
    let lastMsgId    = 0;
    let pollTimer    = null;

    // ── Init ────────────────────────────────────────────────────────────────
    async function init() {
        const token = localStorage.getItem('auth_token');
        if (!token) {
            window.location.href = 'signin.html';
            return;
        }
        try {
            currentUser = JSON.parse(localStorage.getItem('user'));
        } catch(e) {}

        if (isDemo) {
            document.getElementById('chatOrderId').textContent = 'TRX-2026-DEMO1';
            document.getElementById('chatOtherName').textContent = 'Yousef Khalil';
            document.getElementById('chatShipmentRoute').textContent = 'Jordan → Saudi Arabia';
            document.getElementById('chatStatus').textContent = 'In Transit';
            renderDemoMessages();
            return;
        }

        document.getElementById('chatOrderId').textContent = orderId || '—';
        await loadMessages();
        pollTimer = setInterval(pollNewMessages, 3000);
    }

    // ── Demo conversation — shown when opened without a real shipment ────────
    function renderDemoMessages() {
        const demoMsgs = [
            { id: 1, body: 'Hi! I just picked up your iPhone, heading to the airport now.', sender_name: 'Yousef Khalil', is_mine: false, time: '09:14', date: 'Today' },
            { id: 2, body: 'Great, thank you! Please keep it safe 🙏', sender_name: currentUser?.name || 'You', is_mine: true, time: '09:16', date: 'Today' },
            { id: 3, body: 'Of course! I will send updates once I land in Riyadh.', sender_name: 'Yousef Khalil', is_mine: false, time: '09:17', date: 'Today' },
        ];
        renderMessages(demoMsgs);
        lastMsgId = 3;
    }

    // ── Load all messages ───────────────────────────────────────────────────
    async function loadMessages() {
        try {
            const res  = await apiFetch(`/chat/${shipmentId}`);
            const data = await res.json();

            if (!data.success) {
                renderChatError(data.message || 'Could not load messages for this shipment.');
                return;
            }

            // Set the header from the shipment/other_party data — works even
            // if there are no incoming messages yet to infer the name from.
            if (data.other_party) {
                document.getElementById('chatOtherName').textContent = data.other_party.name || 'Unknown';
            }
            if (data.shipment) {
                document.getElementById('chatShipmentRoute').textContent = data.shipment.route || '—';
                document.getElementById('chatStatus').textContent = data.shipment.status_label || '—';
            }

            const msgs = data.messages;
            if (msgs.length === 0) {
                renderEmpty();
            } else {
                renderMessages(msgs);
                lastMsgId = msgs[msgs.length - 1].id;
            }
        } catch(e) {
            console.error('Chat load error:', e);
            renderChatError('Could not connect to the server. Please check your connection and try again.');
        }
    }

    function renderChatError(message) {
        const container = document.getElementById('chatMessages');
        container.innerHTML = `
            <div class="chat-empty">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#EF4444" stroke-width="1.6">
                    <circle cx="12" cy="12" r="10"/><path d="M12 8v5M12 16h.01" stroke-linecap="round"/>
                </svg>
                <span style="color:#991B1B;">${escHtml(message)}</span>
            </div>`;
    }

    // ── Poll for new messages ───────────────────────────────────────────────
    async function pollNewMessages() {
        try {
            const res  = await apiFetch(`/chat/${shipmentId}`);
            const data = await res.json();
            if (!data.success) return;

            const msgs    = data.messages;
            const newMsgs = msgs.filter(m => m.id > lastMsgId);
            if (!newMsgs.length) return;

            const container = document.getElementById('chatMessages');
            const empty     = container.querySelector('.chat-empty, .chat-loading');
            if (empty) empty.remove();

            newMsgs.forEach(m => container.appendChild(buildBubble(m)));
            lastMsgId = msgs[msgs.length - 1].id;
            scrollBottom();
        } catch(e) {}
    }

    // ── Render all messages ─────────────────────────────────────────────────
    function renderMessages(msgs) {
        const container = document.getElementById('chatMessages');
        container.innerHTML = '';
        let lastDate = '';

        msgs.forEach(m => {
            const date = m.date;
            if (date !== lastDate) {
                const sep = document.createElement('div');
                sep.className   = 'date-sep';
                sep.textContent = date;
                container.appendChild(sep);
                lastDate = date;
            }
            container.appendChild(buildBubble(m));
        });

        // Set header name from first non-mine message
        const other = msgs.find(m => !m.is_mine);
        if (other) document.getElementById('chatOtherName').textContent = other.sender_name;

        scrollBottom();
    }

    function renderEmpty() {
        const container = document.getElementById('chatMessages');
        container.innerHTML = `
            <div class="chat-empty">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none">
                    <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"
                          stroke="#9CA3AF" stroke-width="1.5"/>
                </svg>
                <span>No messages yet — say hi! 👋</span>
            </div>`;
    }

    // ── Build message bubble ────────────────────────────────────────────────
    function buildBubble(m) {
        const row = document.createElement('div');
        row.className = `msg-row ${m.is_mine ? 'mine' : ''}`;

        const initials = (m.sender_name || '?').split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);

        row.innerHTML = `
            <div class="msg-avatar">${initials}</div>
            <div>
                <div class="msg-bubble">${escHtml(m.body)}</div>
                <div class="msg-time">${m.time}</div>
            </div>`;
        return row;
    }

    // ── Send message ────────────────────────────────────────────────────────
    async function sendMessage() {
        const input = document.getElementById('chatInput');
        const body  = input.value.trim();
        if (!body) return;

        const btn = document.getElementById('sendBtn');
        btn.disabled = true;
        input.value  = '';

        // Demo mode — simulate sending + a quick reply, no real API call
        if (isDemo) {
            const container = document.getElementById('chatMessages');
            lastMsgId++;
            container.appendChild(buildBubble({
                id: lastMsgId, body, sender_name: currentUser?.name || 'You',
                is_mine: true, time: nowTime(),
            }));
            scrollBottom();

            setTimeout(() => {
                lastMsgId++;
                container.appendChild(buildBubble({
                    id: lastMsgId, body: 'Got it 👍', sender_name: 'Yousef Khalil',
                    is_mine: false, time: nowTime(),
                }));
                scrollBottom();
            }, 1200);

            btn.disabled = false;
            input.focus();
            return;
        }

        try {
            const res  = await apiFetch(`/chat/${shipmentId}`, 'POST', { body });
            const data = await res.json();
            if (data.success) {
                const container = document.getElementById('chatMessages');
                const empty = container.querySelector('.chat-empty');
                if (empty) empty.remove();
                container.appendChild(buildBubble(data.message));
                lastMsgId = data.message.id;
                scrollBottom();
            } else {
                input.value = body; // restore so the user doesn't lose what they typed
                showChatNotice(data.message || 'Could not send message. Please try again.');
            }
        } catch(e) {
            console.error('Send error:', e);
            input.value = body;
            alert('Could not send message — please check your connection and try again.');
        } finally {
            btn.disabled = false;
            input.focus();
        }
    }

    function handleKey(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    }

    function scrollBottom() {
        const c = document.getElementById('chatMessages');
        c.scrollTop = c.scrollHeight;
    }

    function showChatNotice(message) {
        let notice = document.getElementById('chatNotice');
        if (!notice) {
            notice = document.createElement('div');
            notice.id = 'chatNotice';
            notice.style.cssText = 'background:#FEF2F2;color:#991B1B;padding:0.6rem 1rem;font-size:0.85rem;border-top:1px solid #FECACA;';
            document.querySelector('.chat-input-bar')?.insertAdjacentElement('beforebegin', notice);
        }
        notice.textContent = message;
        notice.style.display = 'block';
        clearTimeout(window.__chatNoticeTimeout);
        window.__chatNoticeTimeout = setTimeout(() => { notice.style.display = 'none'; }, 5000);
    }

    function escHtml(str) {
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function nowTime() {
        const d = new Date();
        return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
    }

    // ── API fetch helper ─────────────────────────────────────────────────────
    async function apiFetch(path, method='GET', body=null) {
        const token = localStorage.getItem('auth_token');
        const opts  = {
            method,
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`,
                'Accept': 'application/json',
            },
        };
        if (body) opts.body = JSON.stringify(body);
        return fetch(window.API_BASE_URL + path, opts);
    }

    // Pause on tab hide
    document.addEventListener('visibilitychange', () => {
        if (isDemo) return; // no polling needed in demo mode
        if (document.hidden) {
            clearInterval(pollTimer);
        } else {
            pollNewMessages();
            pollTimer = setInterval(pollNewMessages, 3000);
        }
    });

    window.addEventListener('beforeunload', () => clearInterval(pollTimer));
    document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
